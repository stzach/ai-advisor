<kendo-chat
  [messages]="(feed | async) ?? []"
  [authorId]="user.id"
  (sendMessage)="sendMessage($event)"
  (executeAction)="executeAction($event)"
>
  <ng-template kendoChatReceiverMessageContentTemplate let-message>
    <div [innerHTML]="message.text | markdown"></div>
  </ng-template>
</kendo-chat>
